<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Verification | FixoFix Partner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a; /* Dark theme for worker app to distinguish from customer app */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .worker-card {
            max-width: 420px;
            margin: auto;
            background: #1e293b;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cash-highlight {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .amount-text {
            font-size: 3rem;
            font-weight: 800;
            color: #22c55e;
            display: block;
        }

        .confirm-btn {
            background: #22c55e;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .confirm-btn:hover {
            background: #16a34a;
            transform: scale(1.02);
        }

        .otp-display {
            letter-spacing: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 10px;
        }

        /* Pulse animation for the notification */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.4); }
            100% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="worker-card animate__animated animate__fadeInUp">
        
        <div class="text-center mb-4">
            <div class="badge bg-success mb-2">PAYMENT PENDING</div>
            <h3 class="fw-bold">Collect Cash</h3>
            <p class="text-muted">Job: Electrician Repair at Sector 4</p>
        </div>

        <div class="cash-highlight pulse">
            <span class="small text-uppercase fw-bold">Receive exactly</span>
            <span class="amount-text">₹900</span>
        </div>

        <div class="bg-dark rounded-4 p-3 mb-4 border border-secondary">
            <div class="d-flex align-items-center mb-2">
                <i class="bi bi-info-circle me-2 text-warning"></i>
                <small class="fw-bold">Verification Logic</small>
            </div>
            <p class="small text-muted mb-0">Ask the customer for their 4-digit verification code or ensure the cash is in your hand before clicking confirm.</p>
        </div>

        <button class="btn btn-success w-100 confirm-btn mb-3" onclick="verifyReceipt()">
            Confirm Money Received
        </button>

        <button class="btn btn-link w-100 text-secondary text-decoration-none small" onclick="reportIssue()">
            Customer refused to pay?
        </button>
    </div>
</div>

<script>
    function verifyReceipt() {
        const check = confirm("Have you physically received ₹900 from the customer?");
        if (check) {
            // Logic: Send API call to server
            // POST /worker/confirm-payment { jobId: 123 }
            
            document.querySelector('.worker-card').innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                    <h2 class="mt-4 fw-bold">Earnings Updated!</h2>
                    <p class="text-muted">₹900 has been added to your wallet balance.</p>
                    <button class="btn btn-outline-light mt-3 px-5 rounded-pill" onclick="location.reload()">Next Job</button>
                </div>
            `;
            
            // In a real app, this triggers the WebSocket to update the Customer's screen automatically
        }
    }

    function reportIssue() {
        alert("Management notified. Please do not leave the premises until support calls you.");
    }
</script>

</body>
</html>
