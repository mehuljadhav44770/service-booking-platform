  <div class="summary-container">
    <a href="admin-dashboard.html" class="btn btn-outline-primary btn-back">
      <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
    </a>
    <h2 class="summary-heading">Platform Summary</h2>
    <div class="row summary-cards mb-4">
      <div class="col-md-4"><div class="card p-4"><h5>Total Platform Income</h5><h4 class="text-success">₹1,25,000</h4></div></div>
      <div class="col-md-4"><div class="card p-4"><h5>Total Registered Workers</h5><h4 class="text-primary">412</h4></div></div>
      <div class="col-md-4"><div class="card p-4"><h5>Total Registered Customers</h5><h4 class="text-warning">820</h4></div></div>
    </div>
    <div class="chart-container">
      <div class="filter-row">
        <div>
          <label class="form-label fw-semibold">Filter by:</label>
          <select class="form-select" id="dataType">
            <option value="earnings">Platform Earnings</option>
            <option value="workers">Worker Growth</option>
            <option value="customers">Customer Growth</option>
          </select>
        </div>
       <div class="d-flex gap-3 align-items-end">
  <div>
    <label class="form-label fw-semibold">Year:</label>
    <select class="form-select" id="yearFilter">
      <option value="2024">2024</option>
      <option value="2025" selected>2025</option>
    </select>
  </div>
  <div>
    <label class="form-label fw-semibold">Month:</label>
    <select class="form-select" id="monthFilter">
      <option value="">All</option>
      <option value="0">January</option>
      <option value="1">February</option>
      <option value="2">March</option>
      <option value="3">April</option>
      <option value="4">May</option>
      <option value="5">June</option>
      <option value="6">July</option>
      <option value="7">August</option>
      <option value="8">September</option>
      <option value="9">October</option>
      <option value="10">November</option>
      <option value="11">December</option>
    </select>
  </div>
</div>

      </div>
      
      <canvas id="summaryChart" height="100"></canvas>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>
  const chartCtx = document.getElementById('summaryChart').getContext('2d');
  let summaryChart;

  const chartData = {
    earnings: [10000, 15000, 18000, 12000, 22000, 30000, 28000, 35000, 39000, 41000, 43000, 46000],
    workers: [20, 30, 25, 35, 40, 50, 45, 55, 60, 70, 65, 75],
    customers: [50, 60, 55, 70, 80, 90, 85, 95, 100, 110, 105, 120]
  };

  function renderChart(type = 'earnings', month = '') {
    const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let data = chartData[type];
    let chartLabels = labels;
    let chartDataSet = data;

    if (month !== '') {
      chartLabels = [labels[month]];
      chartDataSet = [data[month]];
    }

    if (summaryChart) summaryChart.destroy();

    summaryChart = new Chart(chartCtx, {
      type: 'bar', // use bar for all types
      data: {
        labels: chartLabels,
        datasets: [{
          label: type.charAt(0).toUpperCase() + type.slice(1),
          data: chartDataSet,
          backgroundColor: 'rgba(0, 123, 255, 0.5)',
          borderColor: '#007bff',
          borderWidth: 1,
          borderRadius: 6,
          maxBarThickness: 50 // 🔧 prevents overly wide bars
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true },
          x: { grid: { display: false } }
        }
      }
    });
  }

  document.getElementById('dataType').addEventListener('change', function () {
    const selectedMonth = document.getElementById('monthFilter').value;
    renderChart(this.value, selectedMonth);
  });

  document.getElementById('yearFilter').addEventListener('change', function () {
    alert('Year changed: data would refresh');
  });

  document.getElementById('monthFilter').addEventListener('change', function () {
    const selectedType = document.getElementById('dataType').value;
    renderChart(selectedType, this.value);
  });

  renderChart('earnings');
</script>
