<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Registered Users - FixoFix Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f4f8;
    }

    .custom-navbar {
      background-color: #007bff;
      padding: 1rem 1.5rem;
      box-shadow: 0 4px 12px rgba(21, 176, 203, 0.1);
    }

    .custom-navbar .navbar-brand,
    .custom-navbar .nav-link,
    .custom-navbar .logout-btn {
      color: white !important;
    }

    .page-header {
      text-align: center;
      margin-top: 40px;
    }

    .page-header h2 {
      font-weight: 600;
      font-size: 2.2rem;
    }

    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    th {
      background-color: #007bff;
      color: white;
    }

    td, th {
      vertical-align: middle !important;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar custom-navbar">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <!-- Back Button -->
    <a class="btn btn-outline-light back-btn position-relative z-2" href="admin-dashboard.html">
      <i class="fas fa-arrow-left"></i> Back
    </a>

    <!-- Centered FixoFix Logo -->
    <div class="mx-auto text-white fw-bold fs-4 d-flex align-items-center">
      <i class="fas fa-wrench me-2"></i>FixoFix Admin
    </div>

    <!-- Spacer -->
    <div style="width: 105px;"></div>
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
  <div class="page-header mb-4">
    <h2><span class="text-primary">Registered</span> Users</h2>
    <p class="text-muted">List of all users on the platform</p>
  </div>

  <!-- Search Bar -->
  <div class="mb-4 mt-4 d-flex justify-content-center">
    <input
      type="text"
      id="searchInput"
      class="form-control w-50"
      placeholder="Search by name, email, phone, address, or role..."
    />
  </div>

  <div class="card p-4">
    <div class="table-responsive">
      <table class="table table-hover" id="userTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Role</th>
            <th>Registered At</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <tr>
            <td colspan="7" class="text-center text-muted">Loading users...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const tableBody = document.getElementById("userTableBody");
    const searchInput = document.getElementById("searchInput");
    let usersData = [];

    try {
      const response = await fetch("http://localhost:3000/api/users");
      usersData = await response.json();
      renderTable(usersData);

      // Search filter
      searchInput.addEventListener("keyup", () => {
        const query = searchInput.value.toLowerCase();
        const filteredUsers = usersData.filter(user =>
          (user.name && user.name.toLowerCase().includes(query)) ||
          (user.email && user.email.toLowerCase().includes(query)) ||
          (user.phone && user.phone.toLowerCase().includes(query)) ||
          (user.address && user.address.toLowerCase().includes(query)) ||
          (user.role && user.role.toLowerCase().includes(query))
        );
        renderTable(filteredUsers);
      });

    } catch (error) {
      console.error("Error fetching users:", error);
      tableBody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">Failed to load users.</td></tr>`;
    }

    function renderTable(users) {
      tableBody.innerHTML = "";
      if (!users || users.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">No users found.</td></tr>`;
        return;
      }

      users.forEach((user, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${user.name || '—'}</td>
          <td>${user.email || '—'}</td>
          <td>${user.phone || '—'}</td>
          <td>${user.address || '—'}</td>
          <td>${user.role || '—'}</td>
          <td>${new Date(user.created_at).toLocaleString()}</td>
        `;
        tableBody.appendChild(row);
      });
    }
  });
</script>

</body>
</html>
