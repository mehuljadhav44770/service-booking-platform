<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Worker Registered - FixoFix Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Bootstrap + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f4f8;
    }

    .custom-navbar {
      background-color: #007bff;
      padding: 1rem 1.5rem;
      box-shadow: 0 4px 12px rgba(21, 176, 203, 0.1);
    }

    .custom-navbar .navbar-brand,
    .custom-navbar .nav-link,
    .custom-navbar .logout-btn {
      color: white !important;
    }

    .logout-btn {
      border: 1px solid white;
      padding: 6px 12px;
      border-radius: 5px;
      font-weight: 500;
    }

    .logout-btn:hover {
      background-color: white;
      color: #007bff !important;
    }

    .page-header {
      text-align: center;
      margin-top: 40px;
    }

    .page-header h2 {
      font-weight: 600;
      font-size: 2.2rem;
    }

    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    th {
      background-color: #007bff;
      color: white;
    }

    td, th {
      vertical-align: middle !important;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar custom-navbar">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <a href="admin-dashboard.html" class="btn btn-light fw-semibold">
      <i class="fas fa-arrow-left me-2"></i>Back
    </a>

    <div class="mx-auto text-white fw-bold fs-4 d-flex align-items-center">
      <i class="fas fa-wrench me-2"></i>FixoFix Admin
    </div>

    <div style="width: 105px;"></div>
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
  <div class="page-header mb-4">
    <h2><span class="text-primary">Registered</span> Workers</h2>
    <p class="text-muted">List of all service workers on the platform</p>
  </div>

  <!-- Search Bar -->
  <div class="mb-4 mt-4 d-flex justify-content-center">
    <input
      type="text"
      id="searchInput"
      class="form-control w-50"
      placeholder="Search by name, service, email, city, status, etc."
      onkeyup="filterTable()"
    />
  </div>

  <div class="card p-4">
    <div class="table-responsive">
      <table class="table table-hover align-middle" id="workerTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Service</th>
            <th>Experience</th>
            <th>City</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="workerTableBody">
          <tr>
            <td colspan="8" class="text-center text-muted">Loading workers...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Dynamic Table Script -->
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const tableBody = document.getElementById("workerTableBody");

    try {
      const response = await fetch('https://fixofix-service-booking-platform.onrender.com/registered-workers');
      const workers = await response.json();

      tableBody.innerHTML = '';

      if (!workers || workers.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No workers registered.</td></tr>`;
        return;
      }

      workers.forEach((worker, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${worker.name || '—'}</td>
          <td>${worker.phone || '—'}</td>
          <td>${worker.email || '—'}</td>
          <td>${worker.service || '—'}</td>
          <td>${worker.experience || '—'} yrs</td>
          <td>${worker.city || worker.location || '—'}</td>
          <td>
            <span class="badge bg-${worker.active ? 'success' : 'secondary'}">
              ${worker.active ? 'Active' : 'Inactive'}
            </span>
          </td>
        `;
        tableBody.appendChild(row);
      });
    } catch (err) {
      console.error('Error fetching workers:', err);
      tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-danger">Failed to load workers.</td></tr>`;
    }
  });

  /* ✅ Search Filter Function */
  function filterTable() {
    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    const table = document.getElementById("workerTable");
    const rows = table.getElementsByTagName("tr");

    for (let i = 1; i < rows.length; i++) { // Skip header
      const cells = rows[i].getElementsByTagName("td");
      let match = false;

      for (let j = 0; j < cells.length; j++) {
        const cellText = cells[j].textContent || cells[j].innerText;
        if (cellText.toLowerCase().includes(searchValue)) {
          match = true;
          break;
        }
      }

      rows[i].style.display = match ? "" : "none";
    }
  }
</script>

</body>
</html>
