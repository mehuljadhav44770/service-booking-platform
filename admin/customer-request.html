<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customer Requests - FixoFix Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f4f8;
    }

    .custom-navbar {
      background-color: #007bff;
      padding: 1rem 1.5rem;
      box-shadow: 0 4px 12px rgba(21, 176, 203, 0.1);
    }

    .custom-navbar .btn {
      color: white;
      font-weight: 500;
    }

    .page-header {
      text-align: center;
      margin-top: 40px;
    }

    .page-header h2 {
      font-weight: 600;
      font-size: 2.2rem;
    }

    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    th {
      background-color: #007bff;
      color: white;
    }

    td, th {
      vertical-align: middle !important;
    }

    .badge-pending {
      background-color: #ffc107;
      color: #000;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar custom-navbar">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <!-- Back Button -->
    <a class="btn btn-outline-light back-btn position-relative z-2" href="admin-dashboard.html">
      <i class="fas fa-arrow-left"></i> Back
    </a>

    <!-- Centered Title -->
    <div class="mx-auto text-white fw-bold fs-4 d-flex align-items-center">
      <i class="fas fa-wrench me-2"></i>FixoFix Admin
    </div>

    <!-- Spacer -->
    <div style="width: 105px;"></div>
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
  <div class="page-header mb-4">
    <h2><span class="text-primary">Customer</span> Requests</h2>
    <p class="text-muted">List of all service requests submitted by customers</p>
  </div>
  <div class="mb-4 mt-4 d-flex justify-content-center">
  <input
    type="text"
    id="searchInput"
    class="form-control w-50"
    placeholder="Search by name, service, status, etc."
    onkeyup="filterTable()"
  />
</div>


  <div class="card p-4">
    <div class="table-responsive">
      <table class="table table-hover" id="customerTable">
 <thead class="table">
  <tr>
    <th>#</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Service</th>
    <th>Address</th>
    <th>Preferred Date</th>
    <th>Preferred Time</th>
    
  </tr>
</thead>
  <tbody id="requestTableBody">
    <!-- Requests will be inserted here by JS -->
  </tbody>
</table>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Dynamic Customer Request Table Script -->
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const tableBody = document.getElementById("requestTableBody");

  try {
    const response = await fetch("https://fixofix-service-booking-platform.onrender.com/api/bookings");
    if (!response.ok) throw new Error("Failed to fetch booking data");
    const bookings = await response.json();

    if (bookings.length === 0) {
      tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No customer requests yet.</td></tr>`;
      return;
    }

    bookings.forEach((booking, index) => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${booking.name || '—'}</td>
        <td>${booking.phone || '—'}</td>
        <td>${booking.service || '—'}</td>
        <td>${booking.address || '—'}</td>
        <td>${booking.preferred_date || '—'}</td>
        <td>${booking.preferred_time || '—'}</td>
      `;
      tableBody.appendChild(row);
    });
  } catch (error) {
    console.error("Error fetching data:", error);
    tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-danger">Failed to load customer requests.</td></tr>`;
  }
});

/* ✅ Search Filter Function */
function filterTable() {
  const searchValue = document.getElementById("searchInput").value.toLowerCase();
  const table = document.getElementById("customerTable");
  const rows = table.getElementsByTagName("tr");

  for (let i = 1; i < rows.length; i++) { // start from 1 to skip header
    const cells = rows[i].getElementsByTagName("td");
    let match = false;

    for (let j = 0; j < cells.length; j++) {
      const cellText = cells[j].textContent || cells[j].innerText;
      if (cellText.toLowerCase().includes(searchValue)) {
        match = true;
        break;
      }
    }

    rows[i].style.display = match ? "" : "none";
  }
}
</script>




</body>
</html>
